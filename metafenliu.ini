[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ========= 节点清洗 =========
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ========= 全部节点 =========
custom_proxy_group=🚀 全部节点`select`.*

; ========= 国家自动优选 =========
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)Hong Kong`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)Taiwan`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)Japan`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)United States`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)Singapore`http://www.gstatic.com/generate_204`300,,50

; ========= GitHub 独立组 =========
custom_proxy_group=💻 GitHub`select`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点

; ========= AI & Google =========
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点
custom_proxy_group=🧠 AI`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点
custom_proxy_group=🔎 Google`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点

; ========= 社交 =========
custom_proxy_group=🌐 Meta`select`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点
custom_proxy_group=📸 Instagram`select`[]🌐 Meta
custom_proxy_group=📨 Telegram`select`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🚀 全部节点

; ========= 流媒体 =========
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🚀 全部节点

; ========= 系统 =========
custom_proxy_group=🪟 Microsoft`select`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🇺🇸 美国节点
custom_proxy_group=🔀 非标端口`select`[]DIRECT`[]🚀 全部节点
custom_proxy_group=🐟 漏网之鱼`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]DIRECT

; ========= GitHub 优先规则 =========
ruleset=💻 GitHub,[]DOMAIN-SUFFIX,github.com
ruleset=💻 GitHub,[]DOMAIN-SUFFIX,githubusercontent.com
ruleset=💻 GitHub,[]DOMAIN-SUFFIX,githubassets.com

; ========= Gemini 修正 =========
ruleset=🔎 Google,[]DOMAIN,proactivebackend-pa.googleapis.com
ruleset=🔎 Google,[]DOMAIN,alkalimessages-pa.googleapis.com
ruleset=🔎 Google,[]DOMAIN-KEYWORD,generativelanguage
ruleset=🔎 Google,[]DOMAIN-SUFFIX,gemini.google.com

; ========= 广告 =========
ruleset=REJECT,[]GEOSITE,category-ads-all

; ========= 国内直连 =========
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; ========= AI =========
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,anthropic
ruleset=🔎 Google,[]GEOSITE,google

; ========= 社交 =========
ruleset=🌐 Meta,[]GEOSITE,meta
ruleset=🌐 Meta,[]GEOSITE,facebook
ruleset=🌐 Meta,[]GEOSITE,instagram
ruleset=📨 Telegram,[]GEOSITE,telegram

; ========= 流媒体 =========
ruleset=🎬 YouTube,[]GEOSITE,youtube

; ========= 系统 =========
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple

; ========= 非标端口 =========
ruleset=🔀 非标端口,clash-classic:https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/rule/Custom_Port_Direct.yaml,28800

; ========= FINAL =========
ruleset=🐟 漏网之鱼,[]FINAL
