[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ========= 节点清洗 (更全面的关键词) =========
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website|Fixed|Maintenance

; ========= 全部节点 =========
custom_proxy_group=🚀 全部节点`select`.*

; ========= 国家自动优选 (增加容错) =========
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)Hong Kong|HK|Hkg`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)Taiwan|TW|Tpe`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)Japan|JP|Nrt|Hnd`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)United States|US|USA|SJC|LAX`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)Singapore|SG|Sin`http://www.gstatic.com/generate_204`300,,50

; ========= 业务分组 =========
custom_proxy_group=🤖 AI 服务`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🚀 全部节点
custom_proxy_group=💻 GitHub`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🚀 全部节点
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🚀 全部节点
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🇺🇸 美国节点`[]🇯🇵 日本节点
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🇺🇸 美国节点
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 全部节点`[]🇺🇸 美国节点`[]DIRECT

; ========= 规则优先级排序 (由上至下) =========
; 1. 广告拦截 (最高优先级)
ruleset=REJECT,[]GEOSITE,category-ads-all

; 2. GitHub (开发者高频)
ruleset=💻 GitHub,[]DOMAIN-SUFFIX,github.com
ruleset=💻 GitHub,[]DOMAIN-SUFFIX,githubusercontent.com
ruleset=💻 GitHub,[]DOMAIN-SUFFIX,githubassets.com

; 3. AI 服务 (OpenAI, Claude, Gemini)
ruleset=🤖 AI 服务,[]GEOSITE,openai
ruleset=🤖 AI 服务,[]GEOSITE,anthropic
ruleset=🤖 AI 服务,[]DOMAIN,proactivebackend-pa.googleapis.com
ruleset=🤖 AI 服务,[]DOMAIN,alkalimessages-pa.googleapis.com
ruleset=🤖 AI 服务,[]DOMAIN-KEYWORD,generativelanguage
ruleset=🤖 AI 服务,[]DOMAIN-SUFFIX,gemini.google.com

; 4. 社交与流媒体
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🚀 全部节点,[]GEOSITE,google
ruleset=🚀 全部节点,[]GEOSITE,meta

; 5. 系统自带服务 (通常建议直连)
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🪟 Microsoft,[]GEOSITE,microsoft

; 6. 国内直连 (防止误伤)
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; 7. 最后兜底
ruleset=🐟 漏网之鱼,[]FINAL
