[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ========= 节点清洗 =========
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ========= 国家节点池（精准匹配你机场命名） =========
custom_proxy_group=🚀 全部节点`select`.*

custom_proxy_group=🇭🇰 香港节点`select`(?i)Hong Kong
custom_proxy_group=🇹🇼 台湾节点`select`(?i)Taiwan
custom_proxy_group=🇯🇵 日本节点`select`(?i)Japan
custom_proxy_group=🇺🇸 美国节点`select`(?i)United States
custom_proxy_group=🇸🇬 新加坡节点`select`(?i)Singapore
custom_proxy_group=🇰🇷 韩国节点`select`(?i)Korea
custom_proxy_group=🇨🇦 加拿大节点`select`(?i)Canada
custom_proxy_group=🇬🇧 英国节点`select`(?i)United Kingdom

; ========= AI =========
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🚀 全部节点
custom_proxy_group=🧠 AI`select`[]🇺🇸 美国节点`[]🚀 全部节点

; ========= Meta =========
custom_proxy_group=🌐 Meta`select`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🚀 全部节点

; ========= 常用应用 =========
custom_proxy_group=📸 Instagram`select`[]🌐 Meta
custom_proxy_group=🎬 YouTube`select`[]🚀 全部节点
custom_proxy_group=📨 Telegram`select`[]🚀 全部节点
custom_proxy_group=🔎 Google`select`[]🚀 全部节点

; ========= 系统服务 =========
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🚀 全部节点
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 全部节点
custom_proxy_group=🔀 非标端口`select`[]DIRECT`[]🚀 全部节点
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 全部节点`[]DIRECT

; ========= 广告 =========
ruleset=REJECT,[]GEOSITE,category-ads-all

; ========= 基础直连 =========
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; ========= AI =========
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,anthropic

; ========= Meta 生态 =========
ruleset=🌐 Meta,[]GEOSITE,meta
ruleset=🌐 Meta,[]GEOSITE,facebook
ruleset=🌐 Meta,[]GEOSITE,instagram
ruleset=🌐 Meta,[]DOMAIN-SUFFIX,threads.net

; ========= 其他 =========
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🔎 Google,[]GEOSITE,google
ruleset=🪟 Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple

; ========= 非标端口 =========
ruleset=🔀 非标端口,clash-classic:https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/rule/Custom_Port_Direct.yaml,28800

; ========= 最终兜底 =========
ruleset=🐟 漏网之鱼,[]FINAL
