[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ===== 节点清洗 =====
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website|Maintenance

; ===== 国家节点测速组（低CPU）=====
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)Taiwan|TW`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)Japan|JP`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)Singapore|SG`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)Hong Kong|HK`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)United States|US`http://cp.cloudflare.com/generate_204`600,,100

; ===== AI =====
custom_proxy_group=🤖 ChatGPT`fallback`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=🧠 Gemini`fallback`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`http://cp.cloudflare.com/generate_204`300

; ===== Meta =====
custom_proxy_group=📸 Instagram`fallback`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=🧵 Threads`fallback`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=📘 Facebook`fallback`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300

; ===== X / Grok =====
custom_proxy_group=🐦 X`fallback`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=🤖 Grok`fallback`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`http://cp.cloudflare.com/generate_204`300

; ===== 通讯 =====
custom_proxy_group=📨 Telegram`fallback`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点`http://cp.cloudflare.com/generate_204`300

; ===== 流媒体 =====
custom_proxy_group=🎬 YouTube`fallback`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`http://cp.cloudflare.com/generate_204`300

; ===== 基础 =====
custom_proxy_group=💻 GitHub`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🇺🇸 美国节点
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🇺🇸 美国节点

; ===== 兜底 =====
custom_proxy_group=🚀 Proxy`select`.*
custom_proxy_group=🐟 Final`select`[]🚀 Proxy`[]DIRECT

; ===== 规则 =====
ruleset=REJECT,[]GEOSITE,category-ads-all

ruleset=🤖 ChatGPT,[]GEOSITE,openai

ruleset=🧠 Gemini,[]DOMAIN,proactivebackend-pa.googleapis.com
ruleset=🧠 Gemini,[]DOMAIN,alkalimessages-pa.googleapis.com
ruleset=🧠 Gemini,[]DOMAIN-KEYWORD,generativelanguage
ruleset=🧠 Gemini,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=🧠 Gemini,[]GEOSITE,gemini

ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=📸 Instagram,[]DOMAIN-SUFFIX,cdninstagram.com
ruleset=📸 Instagram,[]DOMAIN-SUFFIX,fbcdn.net

ruleset=🧵 Threads,[]DOMAIN-SUFFIX,threads.net
ruleset=📘 Facebook,[]GEOSITE,facebook

ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🐦 X,[]DOMAIN-SUFFIX,x.com
ruleset=🤖 Grok,[]DOMAIN-SUFFIX,x.ai

ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=💻 GitHub,[]GEOSITE,github

ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🪟 Microsoft,[]GEOSITE,microsoft

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🐟 Final,[]FINAL
