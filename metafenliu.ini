[custom]

enable_rule_generator=true
overwrite_original_rules=true

exclude=流量|套餐|到期|剩余|重置|官网|网站|公告|通知|TG|Telegram|频道|说明|客服|工单|订阅|Expire|Traffic|Reset|Remaining

# ===== 地区节点 =====

custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)Taiwan|TW`http://www.gstatic.com/generate_204`900,,30
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)Japan|JP`http://www.gstatic.com/generate_204`900,,30
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)Singapore|SG`http://www.gstatic.com/generate_204`900,,30
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)Hong Kong|HK`http://www.gstatic.com/generate_204`900,,30
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)United States|US`http://www.gstatic.com/generate_204`900,,30
custom_proxy_group=🇰🇷 韩国节点`url-test`(?i)Korea|KR`http://www.gstatic.com/generate_204`900,,30
custom_proxy_group=🇪🇺 欧洲节点`url-test`(?i)Germany|France|EU`http://www.gstatic.com/generate_204`900,,30

# ===== AI =====

custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点

custom_proxy_group=🧠 Gemini`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点

custom_proxy_group=🧠 Grok`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点

# ===== META =====

custom_proxy_group=📸 Instagram`select`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点

custom_proxy_group=🧵 Threads`select`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点

# ===== 社交 =====

custom_proxy_group=🐦 X`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点

custom_proxy_group=📨 Telegram`select`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点

# ===== 媒体 =====

custom_proxy_group=🎬 YouTube`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点

# ===== 开发 =====

custom_proxy_group=💻 GitHub`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]DIRECT

# ===== 默认 =====

custom_proxy_group=🚀 节点选择`select`.*

custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT

# ===== 规则 =====

ruleset=REJECT,[]GEOSITE,category-ads-all

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 Gemini,[]GEOSITE,gemini
ruleset=🧠 Grok,[]DOMAIN-SUFFIX,grok.x.ai

ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🧵 Threads,[]DOMAIN-SUFFIX,threads.net

ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🐦 X,[]DOMAIN-SUFFIX,x.com

ruleset=📨 Telegram,[]GEOSITE,telegram

ruleset=🎬 YouTube,[]GEOSITE,youtube

ruleset=💻 GitHub,[]GEOSITE,github

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🐟 漏网之鱼,[]FINAL
