[custom]

enable_rule_generator=true
overwrite_original_rules=true

;==============================
; 节点清理
;==============================

exclude=流量|套餐|官网|客服|网站|网址|剩余|到期|重置|防失联

;==============================
; 主策略
;==============================

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔰 手动选择`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔰 手动选择`select`.*

;==============================
; AI
;==============================

custom_proxy_group=🤖 AI`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🚀 节点选择

;==============================
; GitHub
;==============================

custom_proxy_group=🐙 GitHub`select`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT

;==============================
; Telegram
;==============================

custom_proxy_group=📲 Telegram`select`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🚀 节点选择`[]🔰 手动选择

;==============================
; YouTube
;==============================

custom_proxy_group=📺 YouTube`select`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🚀 节点选择

;==============================
; Meta（Instagram / Threads）
;==============================

custom_proxy_group=📘 Meta`select`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🚀 节点选择

;==============================
; Google
;==============================

custom_proxy_group=🌏 Google`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点

;==============================
; Apple
;==============================

custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🇭🇰 香港节点`[]🇯🇵 日本节点

;==============================
; 国家节点组
;==============================

custom_proxy_group=🇭🇰 香港节点`url-test`(?i)hong kong|hongkong|hk`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)taiwan|tw`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇯🇵 日本节点`url-test`(?i)japan|jp`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇺🇸 美国节点`url-test`(?i)united states|us|america`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)singapore|sg`http://www.gstatic.com/generate_204`300,,50

;==============================
; 规则
;==============================

ruleset=🐙 GitHub,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/github.txt
ruleset=📲 Telegram,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt
ruleset=📺 YouTube,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/youtube.txt
ruleset=📘 Meta,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/facebook.txt
ruleset=🌏 Google,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/google.txt
ruleset=🍎 Apple,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt
ruleset=🤖 AI,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/openai.txt

ruleset=DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt
ruleset=DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt

ruleset=🚀 节点选择,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt

ruleset=DIRECT,[]GEOIP,CN
ruleset=🚀 节点选择,[]MATCH
