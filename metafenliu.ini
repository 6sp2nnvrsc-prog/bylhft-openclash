[custom]

enable_rule_generator=true
overwrite_original_rules=false

exclude=流量|套餐|到期|剩余|官网|公告|通知|TG|频道

# ===== 地区测速 =====

custom_proxy_group=🇭🇰 香港`url-test`(?i)Hong Kong|HK`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇯🇵 日本`url-test`(?i)Japan|JP`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇸🇬 新加坡`url-test`(?i)Singapore|SG`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇺🇸 美国`url-test`(?i)United States|US`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🇹🇼 台湾`url-test`(?i)Taiwan|TW`http://www.gstatic.com/generate_204`600,,50

# ===== AI =====

custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国`[]🇯🇵 日本
custom_proxy_group=🧠 Gemini`select`[]🇺🇸 美国`[]🇯🇵 日本
custom_proxy_group=🧠 Grok`select`[]🇺🇸 美国`[]🇯🇵 日本

# ===== Meta =====

custom_proxy_group=📸 Instagram`select`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇹🇼 台湾
custom_proxy_group=🧵 Threads`select`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇹🇼 台湾

# ===== 社交 =====

custom_proxy_group=🐦 X`select`[]🇺🇸 美国`[]🇯🇵 日本
custom_proxy_group=📨 Telegram`select`[]🇸🇬 新加坡`[]🇯🇵 日本

# ===== 媒体 =====

custom_proxy_group=🎬 YouTube`select`[]🇭🇰 香港`[]🇸🇬 新加坡`[]🇺🇸 美国

# ===== 默认 =====

custom_proxy_group=🚀 节点选择`select`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT

ruleset=REJECT,[]GEOSITE,category-ads-all
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 Gemini,[]GEOSITE,gemini
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🧵 Threads,[]DOMAIN-SUFFIX,threads.net
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=🐦 X,[]DOMAIN-SUFFIX,x.com
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube

ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=🐟 漏网之鱼,[]FINAL
