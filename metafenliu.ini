[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ========= 节点清洗 (N100 建议开启，保持列表整洁) =========
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website|Maintenance

; ========= 核心国家组 (启用统一延迟计算) =========
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)Hong Kong|HK`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)Taiwan|TW`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)Japan|JP`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)United States|US`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)Singapore|SG`http://www.gstatic.com/generate_204`300,,50

; ========= 极致业务分流 (N100 专属) =========
; ChatGPT & Gemini: 极致稳定
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点
custom_proxy_group=🧠 Gemini`select`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点
; Meta 业务: 强制避开香港，首选台湾
custom_proxy_group=📸 Meta 业务`select`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点
; X & Grok: 独立全功能开启
custom_proxy_group=🐦 X / Grok`select`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点
; 视频加速: 选香港跑满 8K
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点
; 开发者服务
custom_proxy_group=💻 GitHub`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点
custom_proxy_group=🚀 全部节点`select`.*

; ========= 规则分流排序 =========
ruleset=REJECT,[]GEOSITE,category-ads-all
ruleset=🤖 ChatGPT,[]GEOSITE,openai
; Gemini 核心修正 (防止 Web 界面加载失败)
ruleset=🧠 Gemini,[]DOMAIN,proactivebackend-pa.googleapis.com
ruleset=🧠 Gemini,[]DOMAIN,alkalimessages-pa.googleapis.com
ruleset=🧠 Gemini,[]DOMAIN-KEYWORD,generativelanguage
ruleset=🧠 Gemini,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=🧠 Gemini,[]GEOSITE,gemini
; Meta & X (极速响应)
ruleset=📸 Meta 业务,[]GEOSITE,instagram
ruleset=📸 Meta 业务,[]GEOSITE,facebook
ruleset=📸 Meta 业务,[]DOMAIN-SUFFIX,threads.net
ruleset=🐦 X / Grok,[]GEOSITE,twitter
ruleset=🐦 X / Grok,[]DOMAIN-SUFFIX,x.com
ruleset=🐦 X / Grok,[]DOMAIN-SUFFIX,x.ai
; 基础分流
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=💻 GitHub,[]GEOSITE,github
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=🚀 全部节点,[]FINAL
